name: Deploy Wanderworld to GitHub Pages

on:
  push:
    branches: [main, wanderworld]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wanderworld
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wanderworld/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - name: Build
        env:
          # При деплое на gerainnn.github.io/<repo>/ vite нужен корректный base.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: wanderworld/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
